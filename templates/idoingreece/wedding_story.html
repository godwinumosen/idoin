<h2>Share Your Wedding Story</h2>

<form method="POST">
  {% csrf_token %}

  <input type="text" name="couple_name" placeholder="Couple Name" required>

  <input type="email" name="email" placeholder="Email" required>

  <input type="text" name="location" placeholder="Wedding Location">

  <input type="date" name="date">

  <textarea name="story" placeholder="Tell us your wedding story"></textarea>

  <button type="submit">Submit Story</button>
</form>
